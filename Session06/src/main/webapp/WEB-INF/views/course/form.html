<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/main-layout}">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container mt-4">
        <div class="card shadow-lg p-4">

            <h3 class="text-center mb-4">Cập nhật khóa học</h3>

            <div class="alert alert-info text-center">
                Đang chỉnh sửa: <strong th:text="${course.name}"></strong>
            </div>

            <form th:action="@{/course/update}"
                  method="post"
                  th:object="${course}"
                  onsubmit="return confirm('Xác nhận cập nhật khóa học?');">

                <input type="hidden" th:field="*{id}"/>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label><strong>Học phí</strong></label>
                        <input type="text"
                               th:field="*{fee}"
                               class="form-control"
                               min="0"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label><strong>Ngày khai giảng</strong></label>
                        <input type="date"
                               th:field="*{startDate}"
                               class="form-control">
                    </div>

                </div>

                <div class="text-center mt-4">
                    <button class="btn btn-success px-4">Lưu</button>
                    <a th:href="@{/course/list}"
                       class="btn btn-secondary ml-2">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
